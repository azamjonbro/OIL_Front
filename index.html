<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="author" content="azamjonbro, Azamjonbro">
 <meta name="description" content="this telegram bot is created oil factory and car work shop">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

 <link rel="stylesheet" href="./style.css">
 <title>Oil Project</title>
</head>

<body>
 <header class="header">
  <div class="container header__container">
   <nav class="header__nav">
    <div class="theme"></div>
    <button aria-label="Yaratish" class="header-created-btn" title="yaratish" id="openModal">Yaratish</button>
   </nav>
  </div>
 </header>
 <main>
  <section class="model-user ">
   <div class="user-form container">
    <div class="model-header">
      <h2>Mijoz yaratish</h2>
      <img src="./xicon.svg" alt="X icon" loading="lazy" style="cursor: pointer;" class="xicon">
    </div>
    <div class="model-form">
     <input type="text" class="input" placeholder="Ismi" id="name" name="name" pattern="[A-Za-z\s]{3,20}"
      title="Faqat harflar, kamida 3ta" required>

      <!-- Telefon raqami (UZ format: +998901234567) -->
      <input type="tel" class="input" placeholder="Telefon raqami" id="phone" name="phone" pattern="\+998\d{9}"
       title="+998 bilan boshlanadigan 9 ta raqam" required>

      <!-- Moshina raqami (UZ format: 01A123AA) -->
      <input type="text" class="input" placeholder="Moshina raqami" id="car_number" name="car_number"
       pattern="\d{2}[A-Z]{1}\d{3}[A-Z]{2}" title="Masalan: 01A123AA" required>

      <!-- Moshina markasi (harflar, raqamlar bo'lishi mumkin) -->
      <input type="text" class="input" placeholder="Moshina markasi" id="car_brand" name="car_brand"
       pattern="[A-Za-z0-9\s\-]{2,30}" title="Masalan: Chevrolet Malibu" required>

      <!-- Moy markasi (harflar, raqamlar) -->
      <input type="text" class="input" placeholder="Moy markasi" id="oil_brand" name="oil_brand"
       pattern="[A-Za-z0-9\s\-]{2,30}" title="Masalan: ZIC X7 10W-40" required>

     <input type="text" id="oil_date" class="input" placeholder="Quyilgan vaqti">
<input type="text" id="next_oil_date" class="input" placeholder="Yangilash vaqti">


    </div>
    <button class="header-created-btn">Yaratish</button>
   </div>
   </div>
  </section>
 </main>
 <script>
  flatpickr("#oil_date", {
    dateFormat: "Y-m-d"
  });
  flatpickr("#next_oil_date", {
    dateFormat: "Y-m-d"
  });

 </script>
 <script src="./main.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</body>

</html>
